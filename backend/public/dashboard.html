<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GhostTracker | Real-time Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-red: #fb7185;
            --accent-yellow: #fbbf24;
            --accent-purple: #a78bfa;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }

        h2 { margin: 0; font-size: 1.8rem; letter-spacing: -0.5px; }

        .status-badge {
            padding: 6px 14px;
            background: #334155;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--accent-green);
            border: 1px solid #475569;
            transition: all 0.3s ease;
        }
        .status-badge.error { color: var(--accent-red); border-color: var(--accent-red); }

        /* Stat Cards */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card-dark);
            border-radius: 12px;
            padding: 20px 24px;
            border: 1px solid #334155;
        }
        .stat-card .label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
        .stat-card .value { font-size: 2rem; font-weight: 700; }
        .value.blue   { color: var(--accent-blue); }
        .value.yellow { color: var(--accent-yellow); }
        .value.green  { color: var(--accent-green); }

        .stats-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-dark);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            font-weight: 600;
        }

        #log-container { display: flex; flex-direction: column; gap: 12px; }

        .log-item {
            background: var(--card-dark);
            border: 1px solid #334155;
            padding: 14px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .time {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-blue);
            font-size: 0.85rem;
            width: 90px;
            flex-shrink: 0;
        }

        .tag {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 800;
            margin: 0 16px;
            min-width: 130px;
            text-align: center;
            background: #000;
            flex-shrink: 0;
        }

        .tag.click, .tag.rage_click      { color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
        .tag.product_click               { color: var(--accent-blue);   border: 1px solid var(--accent-blue); }
        .tag.add_to_cart                 { color: var(--accent-green);  border: 1px solid var(--accent-green); }
        .tag.purchase_click,
        .tag.cart_abandon_flag           { color: var(--accent-red);    border: 1px solid var(--accent-red); }
        .tag.session_start,
        .tag.session_end                 { color: var(--accent-purple); border: 1px solid var(--accent-purple); }
        .tag.navigation                  { color: var(--accent-blue);   border: 1px solid #334155; }
        .tag.default                     { color: var(--text-dim);      border: 1px solid #334155; }

        .details { flex-grow: 1; font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .details b { color: #fff; }

        .session-id {
            font-size: 0.75rem;
            color: var(--text-dim);
            background: #0f172a;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            flex-shrink: 0;
        }

        .log-section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .log-section-title h3 { font-size: 1rem; font-weight: 600; }
        .log-section-title span { font-size: 0.8rem; color: var(--text-dim); }

        .empty-log {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <h2>📊 GhostTracker <span style="color:var(--accent-blue)">Real-time</span></h2>
        <div class="status-badge" id="status">연결 확인 중...</div>
    </header>

    <!-- Stat Cards -->
    <div class="stat-grid">
        <div class="stat-card">
            <div class="label">누적 이벤트</div>
            <div class="value blue" id="stat-total">—</div>
        </div>
        <div class="stat-card">
            <div class="label">최근 1시간</div>
            <div class="value yellow" id="stat-hour">—</div>
        </div>
        <div class="stat-card">
            <div class="label">활성 세션 (30분)</div>
            <div class="value green" id="stat-sessions">—</div>
        </div>
    </div>

    <!-- Charts -->
    <div class="stats-grid">
        <div class="card">
            <div class="card-title">이벤트 발생 트렌드 (실시간)</div>
            <canvas id="eventChart" height="100"></canvas>
        </div>
        <div class="card">
            <div class="card-title">이벤트 타입 비율</div>
            <canvas id="typeChart"></canvas>
        </div>
    </div>

    <!-- Event Log -->
    <div class="card">
        <div class="log-section-title">
            <h3>실시간 이벤트 로그</h3>
            <span id="log-count"></span>
        </div>
        <div id="log-container">
            <div class="empty-log">이벤트를 기다리는 중...</div>
        </div>
    </div>

</div>

<script>
// ── Chart 초기화 ────────────────────────────────────────────────
const ctxLine = document.getElementById('eventChart').getContext('2d');
const eventChart = new Chart(ctxLine, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Total Events',
            data: [],
            borderColor: '#38bdf8',
            tension: 0.4,
            fill: true,
            backgroundColor: 'rgba(56, 189, 248, 0.1)',
            pointRadius: 3,
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
            y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
            x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
        }
    }
});

const ctxPie = document.getElementById('typeChart').getContext('2d');
const typeChart = new Chart(ctxPie, {
    type: 'doughnut',
    data: {
        labels: [],
        datasets: [{ data: [], backgroundColor: [], borderWidth: 0 }]
    },
    options: {
        plugins: { legend: { position: 'bottom', labels: { color: '#f1f5f9', font: { size: 11 } } } }
    }
});

const TYPE_COLORS = {
    click: '#fbbf24', rage_click: '#fb7185',
    product_click: '#38bdf8', add_to_cart: '#4ade80',
    purchase_click: '#fb7185', cart_abandon_flag: '#fb7185',
    session_start: '#a78bfa', session_end: '#a78bfa',
    navigation: '#6366f1', inactivity: '#94a3b8',
    scroll_depth: '#64748b', hover_dwell: '#f97316',
    tab_exit: '#ec4899', tab_return: '#ec4899',
    input_change: '#06b6d4', search_use: '#06b6d4',
};
function colorFor(t) { return TYPE_COLORS[t] || '#475569'; }

// ── 이벤트 설명 포맷 ────────────────────────────────────────────
function formatDetail(e) {
    const d = e.data || {};
    switch (e.event_type) {
        case 'product_click':      return `상품 클릭: <b>${d.product_name || d.product_id || ''}</b>`;
        case 'add_to_cart':        return `장바구니 담기: <b>${d.product_name || d.product_id || ''}</b> ×${d.quantity || 1}`;
        case 'remove_from_cart':   return `장바구니 삭제: <b>product #${d.product_id || ''}</b>`;
        case 'purchase_click':     return `💰 결제 시도`;
        case 'cart_abandon_flag':  return `⚠️ 장바구니 이탈 감지`;
        case 'session_start':      return `세션 시작 <span style="color:var(--text-dim)">(${e.device_type || d.device_type || '?'})</span>`;
        case 'session_end':        return `세션 종료${d.session_duration_ms ? ` — <b>${(d.session_duration_ms/1000).toFixed(1)}s</b>` : ''}`;
        case 'rage_click':         return `🔥 rage click <b>×${d.click_count || ''}</b>`;
        case 'click':              return `클릭 — ${d.click_target || ''}`;
        case 'navigation':         return `페이지 이동 → <b>${d.to || e.pathname || ''}</b>`;
        case 'scroll_depth':       return `스크롤 <b>${d.scroll_pct ?? ''}%</b>`;
        case 'scroll_milestone':   return `스크롤 마일스톤 <b>${d.milestone ?? ''}%</b>`;
        case 'inactivity':         return `비활성 <b>${d.inactivity_duration ? (d.inactivity_duration/1000).toFixed(1)+'s' : ''}</b>`;
        case 'section_enter':      return `섹션 진입 — <b>${d.section || ''}</b>`;
        case 'section_exit':       return `섹션 이탈 — <b>${d.section || ''}</b>`;
        case 'hover_dwell':        return `hover <b>${d.dwell_ms || ''}ms</b> — ${d.target_tag || ''}`;
        case 'search_use':         return `검색: <b>"${d.keyword || ''}"</b>`;
        case 'tab_exit':           return `탭 이탈`;
        case 'tab_return':         return `탭 복귀 — <b>${d.away_ms ? (d.away_ms/1000).toFixed(1)+'s' : ''}</b>`;
        case 'time_to_first_click':return `첫 클릭까지 <b>${d.duration_ms ? (d.duration_ms/1000).toFixed(2)+'s' : ''}</b>`;
        case 'input_change':       return `입력 — <b>${d.field_name || ''}</b>`;
        case 'input_abandon':      return `입력 포기 — <b>${d.field_name || ''}</b>`;
        default:                   return `<span style="color:var(--text-dim)">${JSON.stringify(d).slice(0,60)}</span>`;
    }
}

function tagClass(type) {
    const known = ['click','rage_click','product_click','add_to_cart',
                   'purchase_click','cart_abandon_flag','session_start','session_end','navigation'];
    return known.includes(type) ? type : 'default';
}

// ── 메인 루프 ───────────────────────────────────────────────────
async function fetchAll() {
    try {
        const [stats, logs] = await Promise.all([
            fetch('/api/logs/stats').then(r => r.json()),
            fetch('/api/logs?limit=30').then(r => r.json()),
        ]);

        // Stat cards
        document.getElementById('stat-total').textContent    = (stats.total ?? '—').toLocaleString();
        document.getElementById('stat-hour').textContent     = (stats.last_hour ?? '—').toLocaleString();
        document.getElementById('stat-sessions').textContent = stats.active_sessions ?? '—';

        // Status badge
        const badge = document.getElementById('status');
        badge.textContent = `Live · ${new Date().toLocaleTimeString('ko-KR')}`;
        badge.className = 'status-badge';

        // Trend chart
        const now = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        eventChart.data.labels.push(now);
        eventChart.data.datasets[0].data.push(stats.total ?? 0);
        if (eventChart.data.labels.length > 10) {
            eventChart.data.labels.shift();
            eventChart.data.datasets[0].data.shift();
        }
        eventChart.update('none');

        // Type chart
        const byType = stats.by_type || {};
        const entries = Object.entries(byType).sort((a,b) => b[1]-a[1]).slice(0, 8);
        typeChart.data.labels = entries.map(([k]) => k);
        typeChart.data.datasets[0].data = entries.map(([,v]) => v);
        typeChart.data.datasets[0].backgroundColor = entries.map(([k]) => colorFor(k));
        typeChart.update('none');

        // Event log
        const container = document.getElementById('log-container');
        document.getElementById('log-count').textContent = `최근 ${logs.length}건`;

        if (!logs.length) {
            container.innerHTML = '<div class="empty-log">아직 수집된 이벤트가 없습니다</div>';
            return;
        }

        container.innerHTML = '';
        logs.forEach(e => {
            const time = e.received_at
                ? new Date(e.received_at).toLocaleTimeString('ko-KR')
                : '--:--:--';
            const sid = (e.session_id || '').slice(0, 8);

            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `
                <div class="time">${time}</div>
                <div class="tag ${tagClass(e.event_type)}">${e.event_type.replace(/_/g, ' ')}</div>
                <div class="details">${formatDetail(e)}</div>
                <div class="session-id">ID: ${sid}…</div>
            `;
            container.appendChild(div);
        });

    } catch (err) {
        const badge = document.getElementById('status');
        badge.textContent = '연결 오류';
        badge.className = 'status-badge error';
    }
}

fetchAll();
setInterval(fetchAll, 2000);
</script>
</body>
</html>
